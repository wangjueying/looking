name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Decode Android signing keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${{ runner.temp }}/release-keystore.jks"

      - name: Build APK (Release)
        run: flutter build apk --release
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ env.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ env.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ env.ANDROID_KEY_PASSWORD }}

      - name: Publish GitHub release with APK
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
          body: |
            ## 这是什么

            这是一个用于记录物品和存放位置的 Android 应用，支持通过拍照、相册图片或相册视频辅助回忆。

            ## 下载与安装

            - 直接下载下方附带的 `app-release.apk`
            - 安装前如遇系统提示，请先允许安装未知来源应用

            ## 第一次使用

            - 打开应用后先进入设置页
            - 填入你自己的 DashScope API Key
            - 返回首页后即可开始录入和搜索物品

            ## 说明

            - 当前重点支持 Android
            - 识别功能需要联网访问 DashScope API
            - 更详细的使用说明见 `QUICK_START.md` 和 `USER_GUIDE.md`