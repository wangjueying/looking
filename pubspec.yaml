name: looking_2
description: "Item tracker app for recording where things are stored."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.0

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # Network
  dio: ^5.4.0

  # Camera & Image
  image_picker: ^1.0.7
  video_player: ^2.8.0

  # Permissions
  permission_handler: ^11.2.0

  # Storage
  flutter_secure_storage: ^9.1.0

  # JSON Serialization
  json_annotation: ^4.9.0

  video_thumbnail: ^0.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.11
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
