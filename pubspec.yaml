name: looking_2
description: "AI-powered item tracker application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.0

  # Routing
  go_router: ^14.0.0

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # Network
  dio: ^5.4.0

  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Permissions
  permission_handler: ^11.2.0

  # Storage
  flutter_secure_storage: ^9.1.0
  path_provider: ^2.1.2

  # JSON Serialization
  json_annotation: ^4.9.0

  # Functional Programming
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.11
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
